<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>TheView Stock Team</title>
  <link rel="stylesheet" href="main.css?v=24" />
  <link rel="manifest" href="manifest.webmanifest" />
</head>
<body>
  <div id="toast" class="toast"></div>

  <section id="loginPage" class="auth-screen">
    <div class="auth-card">
      <h1>👁️ TheView Stock</h1>
      <p class="muted">ระบบสต๊อกสำหรับทีม</p>
      <input id="username" type="text" placeholder="Username เช่น jettaphonj" autocomplete="username" autocapitalize="none" />
      <input id="password" type="password" placeholder="รหัสผ่าน" autocomplete="current-password" />
      <label class="remember-row"><input id="rememberMe" type="checkbox" /> จดจำ Username ในเครื่องนี้</label>
      <button id="loginBtn" class="btn primary full">เข้าสู่ระบบ</button>
      <p class="note">รหัสผ่านเริ่มต้นสำหรับสมาชิกใหม่: <b>chartered</b></p>
    </div>
  </section>

  <section id="passwordGate" class="auth-screen hidden">
    <div class="auth-card gate-card">
      <div class="door-icon">🔐</div>
      <h1>ตั้งรหัสผ่านใหม่ครั้งแรก</h1>
      <p class="muted">บัญชี <b id="gateMemberName"></b></p>
      <p class="muted">เพื่อความปลอดภัย ต้องตั้งรหัสผ่านส่วนตัวก่อนเข้าสู่ระบบ</p>
      <input id="newPassword" type="password" placeholder="รหัสผ่านใหม่ อย่างน้อย 6 ตัว" autocomplete="new-password" />
      <input id="confirmPassword" type="password" placeholder="ยืนยันรหัสผ่านใหม่" autocomplete="new-password" />
      <button id="changePasswordBtn" class="btn primary full">ตั้งรหัสผ่านใหม่</button>
      <button id="gateLogoutBtn" class="btn light full">กลับหน้าเข้าสู่ระบบ</button>
    </div>
  </section>

  <section id="app" class="app hidden">
    <header class="hero">
      <div>
        <h1>👁️ TheView Stock</h1>
        <p>Mobile First • Team Sync • <span style="opacity:.7">build v24</span></p>
        <small id="memberName" style="opacity:.8"></small>
      </div>
      <button id="logoutBtn" class="chip">ออก</button>
    </header>
    <main id="view" class="page"></main>
    <nav class="bottom-nav">
      <button data-page="home" class="active"><span>🏠</span>หน้าแรก</button>
      <button data-page="stock"><span>📦</span>Stock</button>
      <button data-page="scan"><span>📷</span>AI</button>
      <button data-page="approval"><span>✅</span>ตรวจ</button>
      <button data-page="profile"><span>👤</span>โปรไฟล์</button>
    </nav>
  </section>

  <div id="modal" class="modal hidden">
    <div class="sheet">
      <div class="between"><h2 id="modalTitle">Modal</h2><button id="closeModal" class="btn small">ปิด</button></div>
      <div id="modalBody"></div>
    </div>
  </div>
  <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden />
  <input id="photoInput" type="file" accept="image/*" hidden />
  <input id="fileInput" type="file" accept="image/*,.png,.jpg,.jpeg,.webp,.heic,.heif,.gif,.bmp" hidden />
  <script type="module" src="app.js?v=24"></script>
</body>
</html>
